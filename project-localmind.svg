<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" role="img" aria-labelledby="title desc">
  <title id="title">LocalMind OS preview</title>
  <desc id="desc">A system map illustration for the LocalMind OS project.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#120c2e" />
      <stop offset="55%" stop-color="#23124d" />
      <stop offset="100%" stop-color="#0e1324" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1d68" />
      <stop offset="100%" stop-color="#161b33" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <radialGradient id="glow" cx="62%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="800" height="640" rx="40" fill="url(#bg)" />
